<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LocateME</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <link rel="stylesheet" href="style.css">

  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&family=DM+Mono&display=swap" rel="stylesheet">
</head>

<body>

<div id="map"></div>

<!-- HEADER -->
<div class="header">
  <div class="brand">📍 LocateME</div>
  <input id="searchInput" placeholder="Search place...">
</div>

<!-- INFO PANEL -->
<div class="info-panel" id="infoPanel">
  <div class="title" id="panelName">Destination</div>

  <div class="stats">
    <div id="statDist">—</div>
    <div id="statTime">—</div>
  </div>

  <!-- FARE -->
  <div id="fareBox"></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="script.js"></script>

</body>
</html>
